<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>actually for you</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #000; --surface: #16181c; --border: #2f3336;
    --text: #e7e9ea; --muted: #71767b; --accent: #1d9bf0;
    --like: #f91880; --rt: #00ba7c;
    font-size: 15px;
  }
  body { background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI Variable", "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
  #app { max-width: 600px; margin: 0 auto; border-left: 1px solid var(--border); border-right: 1px solid var(--border); min-height: 100vh; }

  header { position: sticky; top: 0; background: rgba(0,0,0,0.65); backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border); z-index: 10; }
  .htop { padding: 12px 16px 6px; }
  .htop h1 { font-size: 20px; font-weight: 800; letter-spacing: -0.01em; }
  .htop .sub { color: var(--muted); font-size: 13px; margin-top: 2px; }
  .tabs { display: flex; }
  .tabs button { flex: 1; background: none; border: 0; color: var(--muted); font-size: 14px; font-weight: 600;
    padding: 14px 0 12px; cursor: pointer; position: relative; }
  .tabs button:hover { background: rgba(231,233,234,0.03); color: var(--text); }
  .tabs button.on { color: var(--text); }
  .tabs button.on::after { content: ""; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
    width: 56px; height: 4px; border-radius: 2px; background: var(--accent); }

  .tweet { display: flex; gap: 12px; color: inherit; cursor: pointer;
    border-bottom: 1px solid var(--border); padding: 12px 16px; transition: background .12s; }
  .tweet:hover { background: rgba(231,233,234,0.03); }
  .avatar { position: relative; width: 40px; height: 40px; border-radius: 50%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center; overflow: hidden;
    color: #fff; font-weight: 700; font-size: 17px; user-select: none; }
  .avatar img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover;
    opacity: 0; transition: opacity .15s; }
  .body { flex: 1; min-width: 0; }
  .meta { display: flex; align-items: center; gap: 4px; margin-bottom: 2px; }
  .name { font-weight: 700; }
  .name:hover { text-decoration: underline; }
  .handle, .time { color: var(--muted); }
  .time::before { content: "·"; margin: 0 4px; }
  .taste { margin-left: auto; display: inline-flex; align-items: center; gap: 5px;
    font-size: 12px; font-weight: 700; color: var(--accent);
    background: rgba(29,155,240,0.12); border: 1px solid rgba(29,155,240,0.25);
    padding: 2px 9px; border-radius: 999px; white-space: nowrap; }
  .text { line-height: 1.4; white-space: pre-wrap; word-break: break-word; margin-top: 1px; }
  .text a.lnk { color: var(--accent); text-decoration: none; }
  .actions { display: flex; justify-content: space-between; max-width: 340px; margin-top: 12px; color: var(--muted); }
  .act { display: flex; align-items: center; gap: 6px; font-size: 13px; }
  .act svg { width: 18px; height: 18px; fill: currentColor; }
  .act.r:hover { color: var(--accent); } .act.t:hover { color: var(--rt); } .act.l:hover { color: var(--like); }

  /* in-flow gold labels: 👍/👎 on each digest card */
  .arow { display: flex; align-items: center; gap: 12px; margin-top: 12px; }
  .arow .actions { margin-top: 0; flex: 1; }
  .vote { display: flex; gap: 8px; }
  .vote button { background: none; border: 1px solid var(--border); border-radius: 9999px;
    padding: 4px 11px; font-size: 14px; line-height: 1.3; cursor: pointer;
    filter: grayscale(1); opacity: .7; transition: all .12s; }
  .vote button:hover, .vote button.on { filter: none; opacity: 1; }
  .vote .up.on { border-color: var(--rt); background: rgba(0,186,124,0.15); }
  .vote .dn.on { border-color: var(--like); background: rgba(249,24,128,0.15); }

  /* inline media — judge the tweet without opening X */
  .mgrid { display: grid; gap: 2px; margin-top: 12px; border-radius: 16px; overflow: hidden;
    border: 1px solid var(--border); }
  .mgrid.n2, .mgrid.n3, .mgrid.n4 { grid-template-columns: 1fr 1fr; }
  .mgrid.n3 .mi:first-child { grid-row: span 2; }
  .mi { position: relative; background: var(--surface); min-height: 0; }
  .mi img { display: block; width: 100%; height: 100%; object-fit: cover; }
  .mgrid.n1 .mi img { max-height: 500px; height: auto; }
  .mgrid.n2 .mi, .mgrid.n3 .mi, .mgrid.n4 .mi { aspect-ratio: 1; }
  .play { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    pointer-events: none; }
  .play span { width: 52px; height: 52px; border-radius: 50%; background: rgba(29,155,240,0.9);
    border: 4px solid #fff; display: flex; align-items: center; justify-content: center; }
  .play svg { width: 20px; height: 20px; fill: #fff; margin-left: 3px; }

  /* quoted-tweet context card — the "no context" fix */
  .qcard { border: 1px solid var(--border); border-radius: 12px; margin-top: 12px;
    padding: 10px 12px; cursor: pointer; transition: background .12s; overflow: hidden; }
  .qcard:hover { background: rgba(231,233,234,0.04); }
  .qcard .qmeta { display: flex; align-items: center; gap: 5px; font-size: 14px; min-width: 0; }
  .qcard .avatar { width: 18px; height: 18px; font-size: 9px; }
  .qcard .text { font-size: 14px; margin-top: 2px; }
  .qcard .mgrid { margin-top: 8px; border-radius: 10px; }
  .qmiss { color: var(--muted); font-style: italic; font-size: 14px; }

  #status { text-align: center; padding: 40px 16px; color: var(--muted); }
  #status .big { font-size: 20px; font-weight: 800; color: var(--text); margin-bottom: 6px; }

  /* review mode */
  #review { display: none; padding: 16px; }
  #review.on { display: block; }
  #app.review #digest, #app.review .tabs { display: none; }
  .rv-card { border: 1px solid var(--border); border-radius: 16px; padding: 18px; }
  .rv-card .text { margin-top: 10px; font-size: 16px; }
  .rv-dwell { color: var(--accent); font-size: 13px; margin-top: 12px; }
  .rv-dwell a { color: inherit; }
  .rv-actions { display: flex; gap: 12px; margin-top: 18px; }
  .rv-actions button { flex: 1; padding: 13px; border-radius: 9999px; border: 1px solid var(--border);
    font-size: 15px; font-weight: 700; cursor: pointer; background: var(--surface); color: var(--text); }
  .rv-no:hover { background: rgba(249,24,128,0.15); border-color: var(--like); color: var(--like); }
  .rv-yes:hover { background: rgba(0,186,124,0.15); border-color: var(--rt); color: var(--rt); }
  .rv-hint { text-align: center; color: var(--muted); font-size: 12px; margin-top: 14px; }
  #rv-progress { color: var(--muted); font-size: 13px; }
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="htop">
      <h1>actually for you</h1>
      <div class="sub" id="sub">ranked by your taste · not the algorithm</div>
    </div>
    <div class="tabs" id="tabs">
      <button data-days="0" class="on" onclick="setRange(0)">All</button>
      <button data-days="7" onclick="setRange(7)">7 days</button>
      <button data-days="2" onclick="setRange(2)">48h</button>
      <button onclick="toggleReview()">Review ⚖</button>
    </div>
  </header>
  <div id="review"></div>
  <div id="digest"></div>
  <div id="status"></div>
</div>
<script>
const TOKEN = '__AFY_TOKEN__'; // injected by server.ts at serve time — write auth for /review
let days = 0;

// Avatar: a colored-initial circle (always renders instantly) with the real X profile photo layered
// over it via unavatar, lazy-loaded so we never hammer (and rate-limit) unavatar with 50 at once.
// On load the photo fades in over the initial; on a miss the img is removed and the initial stays —
// so we get real headshots where available, a clean initial otherwise, and never a broken image.
function avatar(name, handle){
  const seed = handle || name || '?';
  let h = 0; for (let i=0;i<seed.length;i++) h = (h*31 + seed.charCodeAt(i)) >>> 0;
  const initial = (name || handle || '?').replace(/[^A-Za-z0-9]/g,'').charAt(0).toUpperCase() || '?';
  // same-origin cached proxy (server fetches from unavatar once + caches) — no client rate limit
  const photo = /^[A-Za-z0-9_]{1,20}$/.test(handle)
    ? `<img loading="lazy" src="/avatar/${handle}" onload="this.style.opacity=1" onerror="this.remove()" alt="">`
    : '';
  return `<div class="avatar" style="background:hsl(${h%360} 58% 45%)">${esc(initial)}${photo}</div>`;
}
// Card is a div (not <a>) so inner URL links don't create illegal nested anchors. Whole card opens
// the tweet unless an actual link was clicked.
function openTweet(e, id){
  if (e.target.closest('a')) return;
  window.open('https://x.com/i/web/status/'+id, '_blank', 'noopener');
}
// Quote card opens the QUOTED tweet; stopPropagation so the outer card doesn't also fire.
function openQuoted(e, id){ e.stopPropagation(); openTweet(e, id); }

// Inline media grid: photos render directly (X's pbs CDN, lazy-loaded); video/gif show their
// poster frame with a play badge — clicking the card opens X, where the video actually plays.
function mediaHtml(media){
  const items = (media || []).filter(m => m && m.url).slice(0, 4);
  if (!items.length) return '';
  const cells = items.map(m => `<div class="mi">
      <img loading="lazy" src="${esc(m.url)}" onerror="this.closest('.mi').remove()" alt="">
      ${m.type !== 'photo' ? '<div class="play"><span><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></span></div>' : ''}
    </div>`).join('');
  return `<div class="mgrid n${items.length}">${cells}</div>`;
}

// Quoted-tweet context card. Full card when we captured the original; a stub linking to X when we
// only know the id (pre-capture rows); nothing for plain tweets (quoted == null).
function quoteHtml(q){
  if (!q) return '';
  if (!q.text && !(q.media && q.media.length))
    return `<div class="qcard" onclick="openQuoted(event,'${esc(q.tweet_id)}')"><span class="qmiss">quoted tweet — not captured yet · tap to open on X ↗</span></div>`;
  const handle = q.author_handle || ''; const name = esc(q.author_name || handle || 'Unknown');
  return `<div class="qcard" onclick="openQuoted(event,'${esc(q.tweet_id)}')">
    <div class="qmeta">${avatar(q.author_name, handle)}
      <span class="name">${name}</span>${handle?`<span class="handle">@${esc(handle)}</span>`:''}
      ${q.created_at?`<span class="time">${fmt(q.created_at)}</span>`:''}</div>
    <div class="text">${linkify(q.text || '')}</div>
    ${mediaHtml(q.media)}
  </div>`;
}

const ICON = {
  reply: '<svg viewBox="0 0 24 24"><path d="M1.751 10c0-4.42 3.584-8 8.005-8h4.366c4.49 0 8.129 3.64 8.129 8.13 0 2.96-1.607 5.68-4.196 7.11l-8.054 4.46v-3.69h-.067c-4.49.1-8.183-3.51-8.183-8.01z"/></svg>',
  rt: '<svg viewBox="0 0 24 24"><path d="M4.5 3.88l4.432 4.14-1.364 1.46L5.5 7.55V16c0 1.1.896 2 2 2H13v2H7.5c-2.209 0-4-1.79-4-4V7.55L1.432 9.48.068 8.02 4.5 3.88zM16.5 6H11V4h5.5c2.209 0 4 1.79 4 4v8.45l2.068-1.93 1.364 1.46-4.432 4.14-4.432-4.14 1.364-1.46 2.068 1.93V8c0-1.1-.896-2-2-2z"/></svg>',
  like: '<svg viewBox="0 0 24 24"><path d="M16.697 5.5c-1.222-.06-2.679.51-3.89 2.16l-.805 1.09-.806-1.09C9.984 6.01 8.526 5.44 7.304 5.5c-1.243.07-2.349.78-2.91 1.91-.552 1.12-.633 2.78.479 4.82 1.074 1.97 3.257 4.27 7.129 6.61 3.87-2.34 6.052-4.64 7.126-6.61 1.111-2.04 1.03-3.7.477-4.82-.561-1.13-1.666-1.84-2.908-1.91z"/></svg>',
  views: '<svg viewBox="0 0 24 24"><path d="M8.75 21V3h2v18h-2zM18 21V8.5h2V21h-2zM4 21l.004-10h2L6 21H4zm9.248 0v-7h2v7h-2z"/></svg>'};

function esc(s){ return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function linkify(s){ return esc(s).replace(/https?:\/\/\S+/g, m=>`<a class="lnk" href="${m}" target="_blank" rel="noopener">${m.replace(/^https?:\/\/(www\.)?/,'').slice(0,24)}${m.length>30?'…':''}</a>`); }
function fmt(d){ if(!d) return ''; const dt=new Date(d), s=(Date.now()-dt)/1000;
  if(s<3600) return Math.max(1,Math.round(s/60))+'m';
  if(s<86400) return Math.round(s/3600)+'h';
  return dt.toLocaleDateString(undefined,{month:'short',day:'numeric'}); }
function num(n){ n=Number(n||0); return n>=1e6?(n/1e6).toFixed(1)+'M':n>=1e3?(n/1e3).toFixed(1)+'K':n||''; }
function pcts(items){ const t=items.filter(i=>i.lane!=='explore'); // explore is unscored — keep it out of the band
  const xs=t.map(i=>i.score),lo=Math.min(...xs),hi=Math.max(...xs);
  return items.map(i=> i.lane==='explore'?null : hi===lo?92:Math.round(60+39*(i.score-lo)/(hi-lo))); }

async function load(){
  const d = await fetch(`/digest?limit=50&days=${days}`).then(r=>r.json());
  document.getElementById('sub').textContent = `ranked against ${(d.profile_size||0).toLocaleString()} tweets you've liked · not the algorithm`;
  const box = document.getElementById('digest');
  if(!d.items.length){ box.innerHTML=''; document.getElementById('status').innerHTML='<div class="big">Nothing here yet</div>Scroll X and your digest fills in.'; return; }
  document.getElementById('status').innerHTML='';
  const p = pcts(d.items);
  box.innerHTML = d.items.map((t,i)=>{
    const handle=t.author_handle||''; const name=esc(t.author_name||handle||'Unknown');
    return `<div class="tweet" onclick="openTweet(event,'${esc(t.tweet_id)}')">
      ${avatar(t.author_name, handle)}
      <div class="body">
        <div class="meta">
          <span class="name">${name}</span>
          ${handle?`<span class="handle">@${esc(handle)}</span>`:''}
          ${t.created_at?`<span class="time">${fmt(t.created_at)}</span>`:''}
          ${t.lane==='explore'
            ?`<span class="taste" title="explore lane — outside your taste profile, keeps the bubble open">✧ explore</span>`
            :`<span class="taste" title="cosine similarity to your likes">✦ ${p[i]}%</span>`}
        </div>
        <div class="text">${linkify(t.text)}</div>
        ${mediaHtml(t.media)}
        ${quoteHtml(t.quoted)}
        <div class="arow">
          <div class="actions">
            <span class="act r">${ICON.reply}${num(t.replies)}</span>
            <span class="act t">${ICON.rt}${num(t.rts)}</span>
            <span class="act l">${ICON.like}${num(t.likes)}</span>
            <span class="act">${ICON.views}${num(t.views)}</span>
          </div>
          <span class="vote">
            <button class="up" title="Keep — signs a 👍 gold label" onclick="dgVote(event,'${esc(t.tweet_id)}',1,this)">👍</button>
            <button class="dn" title="Drop — signs a 👎 gold label" onclick="dgVote(event,'${esc(t.tweet_id)}',-1,this)">👎</button>
          </span>
        </div>
      </div></div>`;
  }).join('');
}

// In-flow gold labels: same /review row as review mode (labels.ts takes the latest verdict per
// tweet, so clicking the other button just re-signs). The card stays for this session; the next
// digest build drops reviewed tweets — the vote doubles as a read receipt.
function dgVote(e, id, v, btn){
  e.stopPropagation();
  for (const b of btn.parentElement.children) b.classList.toggle('on', b === btn);
  fetch('/review',{method:'POST',headers:{'Content-Type':'application/json','x-afy-token':TOKEN},
    body:JSON.stringify({tweet_id:id,verdict:v})}).catch(()=>{});
}

function setRange(d){
  days=d;
  document.querySelectorAll('#tabs button[data-days]').forEach(b=>b.classList.toggle('on',+b.dataset.days===d));
  document.getElementById('digest').innerHTML='';
  document.getElementById('status').textContent='Re-ranking…';
  load();
}

// ---- review mode ----
let rvQueue=[], rvIdx=0, rvDone=0;
async function toggleReview(){
  const app=document.getElementById('app'); const on=app.classList.toggle('review');
  document.getElementById('review').classList.toggle('on',on);
  if(on){ rvQueue=(await fetch('/review/queue?limit=50').then(r=>r.json())).tweets; rvIdx=0; rvDone=0; renderReview(); }
}
function renderReview(){
  const box=document.getElementById('review');
  if(rvIdx>=rvQueue.length){ box.innerHTML=`<div id="status"><div class="big">${rvDone?`Signed ${rvDone}`:'All caught up'}</div>Reviewed tweets feed the ranker. Scroll X, then come back.<br><br><button class="rv-yes" style="max-width:200px;margin:0 auto" onclick="toggleReview()">← Back to your feed</button></div>`; return; }
  const t=rvQueue[rvIdx]; const handle=t.author_handle||''; const name=esc(t.author_name||handle||'Unknown');
  box.innerHTML=`
    <div style="margin-bottom:12px;display:flex;align-items:center;gap:14px">
      <button onclick="toggleReview()" style="background:none;border:1px solid var(--border);color:var(--text);border-radius:9999px;font-size:13px;font-weight:600;padding:5px 14px;cursor:pointer">← Back</button>
      <span id="rv-progress">${rvIdx+1} / ${rvQueue.length}</span>
    </div>
    <div class="rv-card">
      <div class="meta" style="gap:10px">${avatar(t.author_name, handle)}
        <span class="name">${name}</span>${handle?`<span class="handle">@${esc(handle)}</span>`:''}</div>
      <div class="text">${t.text?linkify(t.text):'<span style="color:var(--muted);font-style:italic">content not captured — open on X</span>'}</div>
      ${mediaHtml(t.media)}
      ${quoteHtml(t.quoted)}
      <div class="rv-dwell">⏱ ${t.trusted_dwell?(t.trusted_dwell/1000).toFixed(1)+'s lingered':''} · <a href="https://x.com/i/web/status/${esc(t.tweet_id)}" target="_blank" rel="noopener">open on X ↗</a></div>
      <div class="rv-actions"><button class="rv-no" onclick="rvVote(-1)">← Drop</button><button class="rv-yes" onclick="rvVote(1)">Keep →</button></div>
      <div class="rv-hint">← / → arrow keys · the tweets you lingered on</div>
    </div>`;
}
async function rvVote(v){ const t=rvQueue[rvIdx]; if(!t) return; rvIdx++; rvDone++; renderReview();
  fetch('/review',{method:'POST',headers:{'Content-Type':'application/json','x-afy-token':TOKEN},body:JSON.stringify({tweet_id:t.tweet_id,verdict:v})}).catch(()=>{}); }
document.addEventListener('keydown',e=>{ if(!document.getElementById('app').classList.contains('review'))return;
  if(e.key==='ArrowRight')rvVote(1); else if(e.key==='ArrowLeft')rvVote(-1); });

load();
</script>
</body>
</html>
