<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Prune likes — actually for you</title>
<style>
  :root { color-scheme: light dark; }
  body { font: 15px/1.5 -apple-system, system-ui, sans-serif; margin: 0; background: #f7f9f9; }
  header { position: sticky; top: 0; background: #fff; border-bottom: 1px solid #e1e8ed; padding: 12px 16px; display: flex; align-items: center; gap: 16px; }
  header b { font-size: 16px; }
  #stat { color: #536471; font-variant-numeric: tabular-nums; }
  main { max-width: 560px; margin: 24px auto; padding: 0 12px; }
  #tweet { min-height: 200px; display: flex; align-items: center; justify-content: center; }
  #tweet .ph { color: #8899a6; padding: 40px; text-align: center; }
  .bar { position: sticky; bottom: 0; background: #fff; border-top: 1px solid #e1e8ed; padding: 14px; display: flex; gap: 12px; justify-content: center; }
  button { font: inherit; font-weight: 600; border: 0; border-radius: 999px; padding: 12px 28px; cursor: pointer; }
  .drop { background: #f4212e; color: #fff; }
  .keep { background: #00ba7c; color: #fff; }
  .hint { text-align: center; color: #8899a6; font-size: 13px; margin-top: 8px; }
  #done { text-align: center; padding: 60px 20px; color: #536471; }
</style>
</head>
<body>
<header>
  <b>Prune likes</b>
  <span id="stat">loading…</span>
</header>
<main>
  <div id="tweet"><div class="ph">loading…</div></div>
  <div class="hint">← drop &nbsp;·&nbsp; → keep &nbsp;·&nbsp; tweet not loading? just judge from memory or drop it</div>
</main>
<div class="bar">
  <button class="drop" onclick="act(false)">← Drop</button>
  <button class="keep" onclick="act(true)">Keep →</button>
</div>
<div id="done" style="display:none">All caught up — nothing left to review. 🎉</div>

<script src="https://platform.twitter.com/widgets.js" charset="utf-8"></script>
<script>
let queue = [];       // ids still to show this session
let remaining = 0;    // server-side count of unreviewed likes
let current = null;   // id on screen
let busy = false;

const $tweet = document.getElementById("tweet");
const $stat = document.getElementById("stat");

async function refill() {
  // skip ids already acted on this session via the server's own filtering
  const r = await fetch("/prune/queue?limit=50").then(r => r.json());
  remaining = r.remaining;
  queue = r.ids;
}

async function render() {
  if (!queue.length) await refill();
  if (!queue.length) { finish(); return; }
  current = queue.shift();
  $stat.textContent = remaining + " left to review";
  $tweet.innerHTML = '<div class="ph">loading tweet…</div>';
  // twttr may not be ready on first paint
  if (!window.twttr || !twttr.widgets) { setTimeout(render_again, 400); return; }
  $tweet.innerHTML = "";
  let rendered = false;
  try {
    const el = await twttr.widgets.createTweet(current, $tweet, { conversation: "none", align: "center" });
    rendered = !!el;
  } catch (e) { rendered = false; }
  if (!rendered) $tweet.innerHTML = '<div class="ph">Tweet unavailable (deleted/private). Drop it, or keep if you remember liking it.</div>';
}
function render_again() { queue.unshift(current); render(); }

function finish() { document.querySelector(".bar").style.display = "none"; document.querySelector("main").style.display = "none"; $stat.textContent = ""; document.getElementById("done").style.display = "block"; }

async function act(keep) {
  if (busy || !current) return;
  busy = true;
  const id = current;
  remaining = Math.max(0, remaining - 1);
  try {
    if (keep) await fetch("/review", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ tweet_id: id, verdict: 1 }) });
    else await fetch("/prune", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ tweet_id: id, reason: "reviewed" }) });
  } catch (e) {}
  busy = false;
  render();
}

document.addEventListener("keydown", e => {
  if (e.key === "ArrowLeft") { e.preventDefault(); act(false); }
  if (e.key === "ArrowRight") { e.preventDefault(); act(true); }
});

(async () => { await refill(); render(); })();
</script>
</body>
</html>
