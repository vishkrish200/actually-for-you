<svg width="680" viewBox="0 0 680 700" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Online interleave verdict (interleave.ts)</title>
<desc>Flowchart: the daily digest team-drafts cards from two arms, mix versus review-lr; opens and hand votes are attributed to each tweet's first drafting arm as net credit; a two-day horizon check and a thirty judged-event floor gate a one-shot tweet-bootstrap confidence interval that ends in a tied or lean verdict.</desc>
<style>
  text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  .th { font-size: 14px; font-weight: 500; }
  .ts { font-size: 12px; font-weight: 400; }
  rect { stroke-width: 1; }
  .arr { stroke: #888780; stroke-width: 1.5; fill: none; }
  .c-amber rect { fill: #FAEEDA; stroke: #854F0B; } .c-amber .th { fill: #633806; } .c-amber .ts { fill: #854F0B; }
  .c-teal rect { fill: #E1F5EE; stroke: #0F6E56; } .c-teal .th { fill: #085041; } .c-teal .ts { fill: #0F6E56; }
  .c-gray rect { fill: #F1EFE8; stroke: #5F5E5A; } .c-gray .th { fill: #444441; } .c-gray .ts { fill: #5F5E5A; }
  .c-blue rect { fill: #E6F1FB; stroke: #185FA5; } .c-blue .th { fill: #0C447C; } .c-blue .ts { fill: #185FA5; }
  .c-green rect { fill: #EAF3DE; stroke: #3B6D11; } .c-green .th { fill: #27500A; } .c-green .ts { fill: #3B6D11; }
  @media (prefers-color-scheme: dark) {
    .arr { stroke: #B4B2A9; }
    .arrhead { stroke: #B4B2A9; }
    .legend { fill: #B4B2A9; }
  }
</style>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path class="arrhead" d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>

<g class="c-teal"><rect x="200" y="40" width="280" height="56" rx="4"/><text class="th" x="340" y="61" text-anchor="middle" dominant-baseline="central">Team-draft digest</text><text class="ts" x="340" y="83" text-anchor="middle" dominant-baseline="central">matchup: mix vs review-lr</text></g>
<line class="arr" x1="340" y1="96" x2="340" y2="132" marker-end="url(#arrow)"/>

<g class="c-amber"><rect x="200" y="136" width="280" height="56" rx="4"/><text class="th" x="340" y="157" text-anchor="middle" dominant-baseline="central">Feed behavior</text><text class="ts" x="340" y="179" text-anchor="middle" dominant-baseline="central">opens and hand votes</text></g>
<line class="arr" x1="340" y1="192" x2="340" y2="228" marker-end="url(#arrow)"/>

<g class="c-gray"><rect x="200" y="232" width="280" height="56" rx="4"/><text class="th" x="340" y="253" text-anchor="middle" dominant-baseline="central">First-serve attribution</text><text class="ts" x="340" y="275" text-anchor="middle" dominant-baseline="central">credit = opens + up − down</text></g>
<line class="arr" x1="340" y1="288" x2="340" y2="324" marker-end="url(#arrow)"/>

<g class="c-gray"><rect x="200" y="328" width="280" height="56" rx="4"/><text class="th" x="340" y="349" text-anchor="middle" dominant-baseline="central">Horizon check</text><text class="ts" x="340" y="371" text-anchor="middle" dominant-baseline="central">2 digest days served?</text></g>
<line class="arr" x1="480" y1="356" x2="511" y2="356" marker-end="url(#arrow)"/>
<g class="c-gray"><rect x="515" y="328" width="125" height="56" rx="4"/><text class="th" x="577" y="349" text-anchor="middle" dominant-baseline="central">Wait</text><text class="ts" x="577" y="371" text-anchor="middle" dominant-baseline="central">no peeking</text></g>
<line class="arr" x1="340" y1="384" x2="340" y2="420" marker-end="url(#arrow)"/>

<g class="c-gray"><rect x="200" y="424" width="280" height="56" rx="4"/><text class="th" x="340" y="445" text-anchor="middle" dominant-baseline="central">Judged-event floor</text><text class="ts" x="340" y="467" text-anchor="middle" dominant-baseline="central">30 opens + votes?</text></g>
<line class="arr" x1="480" y1="452" x2="511" y2="452" marker-end="url(#arrow)"/>
<g class="c-gray"><rect x="515" y="424" width="125" height="56" rx="4"/><text class="th" x="577" y="445" text-anchor="middle" dominant-baseline="central">Extend on n</text><text class="ts" x="577" y="467" text-anchor="middle" dominant-baseline="central">never on lean</text></g>
<line class="arr" x1="340" y1="480" x2="340" y2="516" marker-end="url(#arrow)"/>

<g class="c-blue"><rect x="200" y="520" width="280" height="56" rx="4"/><text class="th" x="340" y="541" text-anchor="middle" dominant-baseline="central">Bootstrap CI reads once</text><text class="ts" x="340" y="563" text-anchor="middle" dominant-baseline="central">tweet-level, stratified</text></g>

<line class="arr" x1="300" y1="576" x2="212" y2="612" marker-end="url(#arrow)"/>
<line class="arr" x1="380" y1="576" x2="468" y2="612" marker-end="url(#arrow)"/>

<g class="c-gray"><rect x="110" y="616" width="200" height="56" rx="4"/><text class="th" x="210" y="637" text-anchor="middle" dominant-baseline="central">Tied</text><text class="ts" x="210" y="659" text-anchor="middle" dominant-baseline="central">CI contains 0 — final</text></g>
<g class="c-green"><rect x="370" y="616" width="200" height="56" rx="4"/><text class="th" x="470" y="637" text-anchor="middle" dominant-baseline="central">Lean</text><text class="ts" x="470" y="659" text-anchor="middle" dominant-baseline="central">CI excludes 0 — verdict</text></g>
</svg>
