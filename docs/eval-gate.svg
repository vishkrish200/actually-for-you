<svg width="680" viewBox="0 0 680 680" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Offline ship gate (eval.ts)</title>
<desc>Flowchart: hand-signed votes, behavior signals and LLM rubric scores feed a labeled review pool and nine scoring arms; the pool splits into dev, gate, explore and length-band cuts; every arm gets an all-pairs AUC with a paired bootstrap CI; the gate pool alone issues a ship, hold or inconclusive verdict.</desc>
<style>
  text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  .th { font-size: 14px; font-weight: 500; }
  .ts { font-size: 12px; font-weight: 400; }
  rect { stroke-width: 1; }
  .arr { stroke: #888780; stroke-width: 1.5; fill: none; }
  .legend { fill: #5F5E5A; }
  .c-amber rect { fill: #FAEEDA; stroke: #854F0B; } .c-amber .th { fill: #633806; } .c-amber .ts { fill: #854F0B; }
  .c-teal rect { fill: #E1F5EE; stroke: #0F6E56; } .c-teal .th { fill: #085041; } .c-teal .ts { fill: #0F6E56; }
  .c-purple rect { fill: #EEEDFE; stroke: #534AB7; } .c-purple .th { fill: #3C3489; } .c-purple .ts { fill: #534AB7; }
  .c-gray rect { fill: #F1EFE8; stroke: #5F5E5A; } .c-gray .th { fill: #444441; } .c-gray .ts { fill: #5F5E5A; }
  .c-blue rect { fill: #E6F1FB; stroke: #185FA5; } .c-blue .th { fill: #0C447C; } .c-blue .ts { fill: #185FA5; }
  .c-green rect { fill: #EAF3DE; stroke: #3B6D11; } .c-green .th { fill: #27500A; } .c-green .ts { fill: #3B6D11; }
  .c-red rect { fill: #FCEBEB; stroke: #A32D2D; } .c-red .th { fill: #791F1F; } .c-red .ts { fill: #A32D2D; }
  @media (prefers-color-scheme: dark) {
    .arr { stroke: #B4B2A9; }
    .arrhead { stroke: #B4B2A9; }
    .legend { fill: #B4B2A9; }
  }
</style>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path class="arrhead" d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>

<g class="c-purple"><rect x="40" y="40" width="180" height="56" rx="4"/><text class="th" x="130" y="61" text-anchor="middle" dominant-baseline="central">LLM rubric scores</text><text class="ts" x="130" y="83" text-anchor="middle" dominant-baseline="central">feature, never a label</text></g>
<g class="c-teal"><rect x="240" y="40" width="180" height="56" rx="4"/><text class="th" x="330" y="61" text-anchor="middle" dominant-baseline="central">Behavior signals</text><text class="ts" x="330" y="83" text-anchor="middle" dominant-baseline="central">engagements, opens</text></g>
<g class="c-amber"><rect x="440" y="40" width="200" height="56" rx="4"/><text class="th" x="540" y="61" text-anchor="middle" dominant-baseline="central">Hand-signed votes</text><text class="ts" x="540" y="83" text-anchor="middle" dominant-baseline="central">the only gold labels</text></g>

<line class="arr" x1="130" y1="96" x2="130" y2="142" marker-end="url(#arrow)"/>
<line class="arr" x1="330" y1="96" x2="330" y2="142" marker-end="url(#arrow)"/>
<line class="arr" x1="540" y1="96" x2="540" y2="142" marker-end="url(#arrow)"/>

<g class="c-gray"><rect x="40" y="150" width="380" height="56" rx="4"/><text class="th" x="230" y="171" text-anchor="middle" dominant-baseline="central">9 scoring arms</text><text class="ts" x="230" y="193" text-anchor="middle" dominant-baseline="central">5 baselines vs 4 candidates</text></g>
<g class="c-amber"><rect x="440" y="150" width="200" height="56" rx="4"/><text class="th" x="540" y="171" text-anchor="middle" dominant-baseline="central">Review pool</text><text class="ts" x="540" y="193" text-anchor="middle" dominant-baseline="central">split at gate cutoff</text></g>

<line class="arr" x1="540" y1="206" x2="234" y2="260" marker-end="url(#arrow)"/>
<line class="arr" x1="540" y1="206" x2="351" y2="260" marker-end="url(#arrow)"/>
<line class="arr" x1="540" y1="206" x2="469" y2="260" marker-end="url(#arrow)"/>
<line class="arr" x1="540" y1="206" x2="587" y2="260" marker-end="url(#arrow)"/>

<g class="c-gray"><rect x="180" y="266" width="105" height="56" rx="4"/><text class="th" x="232" y="287" text-anchor="middle" dominant-baseline="central">Dev pool</text><text class="ts" x="232" y="309" text-anchor="middle" dominant-baseline="central">advisory</text></g>
<g class="c-teal"><rect x="298" y="266" width="105" height="56" rx="4"/><text class="th" x="350" y="287" text-anchor="middle" dominant-baseline="central">Gate pool</text><text class="ts" x="350" y="309" text-anchor="middle" dominant-baseline="central">post-cutoff</text></g>
<g class="c-gray"><rect x="416" y="266" width="105" height="56" rx="4"/><text class="th" x="468" y="287" text-anchor="middle" dominant-baseline="central">Explore</text><text class="ts" x="468" y="309" text-anchor="middle" dominant-baseline="central">blind spot</text></g>
<g class="c-gray"><rect x="534" y="266" width="105" height="56" rx="4"/><text class="th" x="586" y="287" text-anchor="middle" dominant-baseline="central">Char band</text><text class="ts" x="586" y="309" text-anchor="middle" dominant-baseline="central">200–600</text></g>

<line class="arr" x1="110" y1="206" x2="110" y2="372" marker-end="url(#arrow)"/>
<line class="arr" x1="232" y1="322" x2="232" y2="372" marker-end="url(#arrow)"/>
<line class="arr" x1="350" y1="322" x2="350" y2="372" marker-end="url(#arrow)"/>
<line class="arr" x1="468" y1="322" x2="468" y2="372" marker-end="url(#arrow)"/>
<line class="arr" x1="586" y1="322" x2="586" y2="372" marker-end="url(#arrow)"/>

<g class="c-blue"><rect x="40" y="376" width="600" height="56" rx="4"/><text class="th" x="340" y="397" text-anchor="middle" dominant-baseline="central">All-pairs AUC per arm, per pool</text><text class="ts" x="340" y="419" text-anchor="middle" dominant-baseline="central">paired item-bootstrap 95% CI vs strongest baseline</text></g>

<line class="arr" x1="340" y1="432" x2="340" y2="482" marker-end="url(#arrow)"/>

<g class="c-gray"><rect x="190" y="486" width="300" height="56" rx="4"/><text class="th" x="340" y="507" text-anchor="middle" dominant-baseline="central">Ship gate (gate pool only)</text><text class="ts" x="340" y="529" text-anchor="middle" dominant-baseline="central">beats strongest baseline?</text></g>

<line class="arr" x1="250" y1="542" x2="132" y2="590" marker-end="url(#arrow)"/>
<line class="arr" x1="340" y1="542" x2="340" y2="590" marker-end="url(#arrow)"/>
<line class="arr" x1="430" y1="542" x2="548" y2="590" marker-end="url(#arrow)"/>

<g class="c-green"><rect x="40" y="596" width="180" height="56" rx="4"/><text class="th" x="130" y="617" text-anchor="middle" dominant-baseline="central">Ship</text><text class="ts" x="130" y="639" text-anchor="middle" dominant-baseline="central">AUC win, CI excludes 0</text></g>
<g class="c-red"><rect x="250" y="596" width="180" height="56" rx="4"/><text class="th" x="340" y="617" text-anchor="middle" dominant-baseline="central">Hold</text><text class="ts" x="340" y="639" text-anchor="middle" dominant-baseline="central">no candidate clears</text></g>
<g class="c-amber"><rect x="460" y="596" width="180" height="56" rx="4"/><text class="th" x="550" y="617" text-anchor="middle" dominant-baseline="central">Inconclusive</text><text class="ts" x="550" y="639" text-anchor="middle" dominant-baseline="central">below label floor</text></g>

<text class="ts legend" x="340" y="672" text-anchor="middle">amber = gold votes · teal = verdict path · purple = LLM feature</text>
</svg>
