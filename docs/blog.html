<!doctype html>
<!-- ponytail: static viewer for blog-post.md, same pattern as notes/blog/blog.html. Edits to the .md show on refresh. Needs a server (file:// blocks fetch): python3 -m http.server from repo root, then /docs/blog.html -->
<meta charset="utf-8">
<title>actually-for-you — blog</title>
<style>
  body { max-width: 740px; margin: 40px auto; padding: 0 20px 120px;
         font: 17px/1.65 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
         color: #1a1a1a; }
  h1, h2, h3 { line-height: 1.25; margin-top: 1.8em; }
  h1 { font-size: 2em; }
  img { max-width: 100%; border-radius: 8px; }
  code { background: #f4f4f4; padding: .15em .4em; border-radius: 4px; font-size: .88em; }
  pre code { display: block; padding: 12px 16px; overflow-x: auto; }
  blockquote { border-left: 3px solid #ccc; margin: 0; padding-left: 16px; color: #555; }
  table { border-collapse: collapse; width: 100%; font-size: .92em; }
  th, td { border: 1px solid #ddd; padding: 6px 10px; text-align: left; }
  th { background: #f7f7f7; }
  a { color: #1a6dcc; }
  hr { border: none; border-top: 1px solid #e2e2e2; margin: 2.5em 0; }
  @media (prefers-color-scheme: dark) {
    body { background: #15171a; color: #e6e6e6; }
    code, pre code { background: #23262b; }
    th { background: #1d2024; } th, td { border-color: #333; }
    blockquote { border-color: #444; color: #aaa; } hr { border-color: #2a2d31; }
    a { color: #5aa9ff; }
  }
</style>
<article id="out">Loading… (if this stays, you opened the file directly — it needs a server, see the comment at top)</article>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
  fetch('./blog-post.md')
    .then(r => r.text())
    .then(md => { document.getElementById('out').innerHTML = marked.parse(md); })
    .catch(e => { document.getElementById('out').textContent = 'Could not load blog-post.md: ' + e; });
</script>
